<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>SaaS Proxy Network</title>
	<script src="https://telegram.org/js/telegram-web-app.js"></script>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		:root {
			--bg-color: var(--tg-theme-bg-color, #0f172a);
			--text-color: var(--tg-theme-text-color, #f8fafc);
			--hint-color: var(--tg-theme-hint-color, #94a3b8);
			--button-color: var(--tg-theme-button-color, #3b82f6);
			--button-text-color: var(--tg-theme-button-text-color, #ffffff);
			--secondary-bg-color: var(--tg-theme-secondary-bg-color, #1e293b);
		}
		body { background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
		.tg-card { background-color: var(--secondary-bg-color); }
		.tg-button { background-color: var(--button-color); color: var(--button-text-color); }
		.tab-active { border-bottom: 2px solid var(--button-color); color: var(--button-color); }
		
		/* Custom Scrollbar for clean UI */
		::-webkit-scrollbar { width: 4px; }
		::-webkit-scrollbar-thumb { background: var(--button-color); border-radius: 4px; }
	</style>
</head>
<body class="min-h-screen pb-20 p-4 select-none">

	<div class="flex justify-between items-center mb-6">
		<h1 class="text-xl font-black tracking-tight">Proxy<span class="text-blue-500">Shop</span></h1>
		<div class="tg-card px-4 py-2 rounded-xl border border-white/5 shadow-lg flex items-center gap-2" onclick="mockTopup()">
			<svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
			<span id="wallet-balance" class="font-bold text-green-400">Loading...</span>
		</div>
	</div>

	<div class="flex border-b border-white/10 mb-5">
		<button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex-1 py-3 font-semibold tab-active transition-all">My Proxies</button>
		<button onclick="switchTab('store')" id="tab-store" class="flex-1 py-3 font-semibold transition-all" style="color: var(--hint-color);">Buy Proxies</button>
	</div>

	<div id="loader" class="flex justify-center py-10 hidden">
		<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
	</div>

	<div id="view-dashboard" class="space-y-4">
		<div id="proxies-list" class="space-y-3"></div>
	</div>

	<div id="view-store" class="hidden space-y-4">
		<div id="plans-list" class="space-y-3"></div>
	</div>

	<script>
		const tg = window.Telegram.WebApp;
		tg.expand();
		tg.ready();

		const API_HEADERS = {
			'Content-Type': 'application/json',
			'x-telegram-init-data': tg.initData || ''
		};

		async function initApp() {
			if (!tg.initData) {
				document.body.innerHTML = '<div class="p-6 text-center text-red-400 font-bold mt-10">Access Denied. Please open via Telegram Bot.</div>';
				return;
			}
			
			toggleLoader(true);
			try {
				const [meRes, plansRes] = await Promise.all([
					fetch('/api/me', { headers: API_HEADERS }),
					fetch('/api/plans', { headers: API_HEADERS })
				]);
				
				const meData = await meRes.json();
				const plansData = await plansRes.json();

				if (meData.success) {
					document.getElementById('wallet-balance').innerText = `$${meData.user.balance.toFixed(2)}`;
					renderProxies(meData.proxies);
				}
				if (plansData.success) {
					renderPlans(plansData.plans);
				}
			} catch (e) {
				tg.showAlert("Network error. Please try again.");
			} finally {
				toggleLoader(false);
			}
		}

		function renderProxies(proxies) {
			const list = document.getElementById('proxies-list');
			if (proxies.length === 0) {
				list.innerHTML = `
					<div class="tg-card p-8 text-center rounded-2xl border border-dashed border-white/20">
						<p style="color: var(--hint-color);" class="mb-4">No active proxies found.</p>
						<button onclick="switchTab('store')" class="tg-button px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg">Browse Store</button>
					</div>`;
				return;
			}
			list.innerHTML = proxies.map(p => `
				<div class="tg-card p-4 rounded-2xl border border-white/5 shadow-sm">
					<div class="flex justify-between items-center mb-3">
						<h3 class="font-bold text-sm uppercase tracking-wide">${p.plan_name}</h3>
						<span class="text-xs px-2.5 py-1 bg-green-500/10 text-green-400 rounded-lg font-bold border border-green-500/20">${p.status}</span>
					</div>
					<div class="w-full bg-black/40 h-2.5 rounded-full mb-2 overflow-hidden">
						<div class="bg-blue-500 h-full rounded-full w-full"></div>
					</div>
					<p class="text-xs mb-4 font-medium" style="color: var(--hint-color);">Data Remaining: ${p.bandwidth_remaining_gb} GB</p>
					
					<div class="bg-black/40 p-3 rounded-xl flex justify-between items-center group cursor-pointer active:scale-95 transition-transform" onclick="copyText('${p.proxy_url}')">
						<code class="text-xs font-mono text-gray-300 truncate mr-2">${p.proxy_url}</code>
						<svg class="w-4 h-4 text-blue-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
					</div>
				</div>
			`).join('');
		}

		function renderPlans(plans) {
			const list = document.getElementById('plans-list');
			list.innerHTML = plans.map(p => `
				<div class="tg-card p-5 rounded-2xl border border-white/5 shadow flex items-center justify-between">
					<div>
						<h3 class="font-bold text-[15px]">${p.name}</h3>
						<p class="text-sm mt-0.5" style="color: var(--hint-color);">${p.bandwidth_gb} GB Premium Data</p>
					</div>
					<button onclick="buyPlan(${p.id}, ${p.price})" class="tg-button px-5 py-2.5 rounded-xl font-bold shadow-lg transition-transform active:scale-95 text-sm">
						$${p.price.toFixed(2)}
					</button>
				</div>
			`).join('');
		}

		async function buyPlan(planId, price) {
			tg.showConfirm(`Purchase this plan for $${price}?`, async (confirm) => {
				if (!confirm) return;
				toggleLoader(true);
				
				const res = await fetch('/api/buy', { method: 'POST', headers: API_HEADERS, body: JSON.stringify({ planId }) });
				const data = await res.json();
				
				if (data.success) {
					tg.HapticFeedback.notificationOccurred('success');
					await initApp(); 
					switchTab('dashboard');
				} else {
					tg.HapticFeedback.notificationOccurred('error');
					tg.showAlert(data.error || "Purchase failed.");
				}
				toggleLoader(false);
			});
		}

		async function mockTopup() {
			tg.showConfirm('Add $10 test balance to wallet?', async (confirm) => {
				if(!confirm) return;
				const res = await fetch('/api/topup', { method: 'POST', headers: API_HEADERS, body: JSON.stringify({ amount: 10.00 }) });
				const data = await res.json();
				if(data.success) {
					tg.HapticFeedback.notificationOccurred('success');
					initApp();
				}
			});
		}

		function copyText(text) {
			navigator.clipboard.writeText(text);
			tg.HapticFeedback.impactOccurred('light');
		}

		function switchTab(tab) {
			document.getElementById('view-dashboard').classList.toggle('hidden', tab !== 'dashboard');
			document.getElementById('view-store').classList.toggle('hidden', tab !== 'store');
			
			const baseClass = 'flex-1 py-3 font-semibold transition-all';
			document.getElementById('tab-dashboard').className = tab === 'dashboard' ? `${baseClass} tab-active` : `${baseClass} text-[var(--hint-color)]`;
			document.getElementById('tab-store').className = tab === 'store' ? `${baseClass} tab-active` : `${baseClass} text-[var(--hint-color)]`;
		}

		function toggleLoader(show) {
			document.getElementById('loader').classList.toggle('hidden', !show);
			document.getElementById('view-dashboard').style.opacity = show ? '0.5' : '1';
			document.getElementById('view-store').style.opacity = show ? '0.5' : '1';
		}

		// Boot Application
		initApp();
	</script>
</body>
</html>
