<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>ProxyShop</title>
	
	<script src="https://telegram.org/js/telegram-web-app.js"></script>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	
	<script>
		tailwind.config = {
			darkMode: 'class',
			theme: {
				extend: {
					colors: {
						tg: {
							bg: 'var(--tg-theme-bg-color, #111827)',
							text: 'var(--tg-theme-text-color, #f9fafb)',
							hint: 'var(--tg-theme-hint-color, #9ca3af)',
							btn: 'var(--tg-theme-button-color, #2563eb)',
							btnText: 'var(--tg-theme-button-text-color, #ffffff)',
							secondary: 'var(--tg-theme-secondary-bg-color, #1f2937)'
						}
					}
				}
			}
		}
	</script>
	<style>
		body { 
			background-color: var(--tg-theme-bg-color, #111827); 
			color: var(--tg-theme-text-color, #f9fafb); 
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
			-webkit-tap-highlight-color: transparent;
		}
		
		/* Solid cards instead of expensive blurs for better mobile performance */
		.app-card {
			background-color: var(--tg-theme-secondary-bg-color, #1f2937);
			border: 1px solid rgba(150, 150, 150, 0.1);
			box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
		}
		
		::-webkit-scrollbar { display: none; }
		
		.tab-content { display: none; animation: fadeIn 0.2s ease-out; }
		.tab-content.active { display: block; }
		@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

		/* Custom Range Slider */
		input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
		input[type=range]::-webkit-slider-thumb {
			-webkit-appearance: none;
			height: 24px; width: 24px; border-radius: 50%;
			background: var(--tg-theme-button-color, #2563eb);
			cursor: pointer; margin-top: -10px;
			border: 2px solid var(--tg-theme-bg-color, #111827);
		}
		input[type=range]::-webkit-slider-runnable-track {
			width: 100%; height: 6px; cursor: pointer;
			background: rgba(150,150,150,0.2); border-radius: 99px;
		}
	</style>
</head>
<body class="min-h-screen pb-6 px-4 pt-6 select-none relative transition-colors duration-200">

	<!-- Error State -->
	<div id="env-error" class="hidden fixed inset-0 z-[100] bg-tg-bg flex items-center justify-center p-6 text-center">
		<div class="app-card p-8 rounded-3xl w-full max-w-sm">
			<i data-lucide="shield-alert" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
			<h2 class="text-xl font-bold mb-2 text-tg-text">Bot Access Only</h2>
			<p class="text-tg-hint text-sm">Please launch this mini-app directly from the Telegram bot menu.</p>
		</div>
	</div>

	<div id="app-container" class="hidden">
		<!-- Header -->
		<header class="flex justify-between items-center mb-8">
			<div class="flex items-center gap-3">
				<div class="w-11 h-11 rounded-full bg-tg-btn flex items-center justify-center shadow-lg text-tg-btnText">
					<i data-lucide="globe" class="w-6 h-6"></i>
				</div>
				<div>
					<h1 class="text-xl font-black tracking-tight leading-none text-tg-text">ProxyShop</h1>
					<p class="text-xs text-tg-hint mt-1 font-medium" id="user-greeting">Loading...</p>
				</div>
			</div>
			
			<button onclick="openDepositModal()" class="app-card px-4 py-2.5 rounded-2xl flex items-center gap-2 active:scale-95 transition-transform border-green-500/20">
				<i data-lucide="wallet" class="w-4 h-4 text-green-500"></i>
				<span id="wallet-balance" class="font-bold text-green-500">$-.--</span>
			</button>
		</header>

		<!-- Navigation -->
		<div class="flex bg-tg-secondary p-1.5 rounded-2xl mb-6">
			<button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-tg-bg text-tg-btn shadow-sm">My Proxies</button>
			<button onclick="switchTab('store')" id="tab-store" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-tg-hint">Store</button>
		</div>

		<!-- Skeleton Loader -->
		<div id="global-loader" class="space-y-4">
			<div class="app-card h-32 rounded-3xl animate-pulse bg-tg-secondary/50"></div>
			<div class="app-card h-32 rounded-3xl animate-pulse bg-tg-secondary/50 delay-75"></div>
		</div>

		<!-- TAB: Dashboard -->
		<div id="view-dashboard" class="tab-content">
			<div id="proxies-empty" class="hidden flex-col items-center justify-center py-12 px-4 text-center">
				<div class="w-20 h-20 bg-tg-secondary rounded-full flex items-center justify-center mb-4 text-tg-hint">
					<i data-lucide="server-off" class="w-10 h-10"></i>
				</div>
				<h2 class="text-lg font-bold mb-2 text-tg-text">No Proxies Yet</h2>
				<p class="text-sm text-tg-hint mb-6">Get premium residential proxies from our store.</p>
				<button onclick="switchTab('store')" class="px-8 py-3.5 bg-tg-btn text-tg-btnText rounded-full font-bold active:scale-95 transition-transform">
					Open Store
				</button>
			</div>
			<div id="proxies-list" class="space-y-4 pb-8"></div>
		</div>

		<!-- TAB: Store -->
		<div id="view-store" class="tab-content">
			<div id="plans-list" class="space-y-3 pb-8"></div>
		</div>
	</div>

	<!-- MODAL: Deposit -->
	<div id="deposit-modal" class="fixed inset-0 z-50 hidden items-end justify-center bg-black/60 transition-opacity opacity-0">
		<div class="bg-tg-bg w-full rounded-t-3xl p-6 transform transition-transform translate-y-full border-t border-tg-hint/20" id="deposit-modal-content">
			<div class="flex justify-between items-center mb-6">
				<div>
					<h3 class="text-xl font-bold text-tg-text">Add Funds</h3>
				</div>
				<button onclick="closeDepositModal()" class="p-2 rounded-full bg-tg-secondary text-tg-hint active:scale-95"><i data-lucide="x" class="w-5 h-5"></i></button>
			</div>
			
			<div class="space-y-6 pb-4">
				<div>
					<div class="flex justify-between items-end mb-4">
						<span class="text-4xl font-black text-tg-text">$<span id="deposit-amount-display">10</span></span>
					</div>
					<input type="range" id="deposit-slider" min="1" max="100" value="10" oninput="updateDepositAmount(this.value)">
					<div class="flex justify-between text-xs text-tg-hint mt-2 font-medium">
						<span>$1</span><span>$50</span><span>$100</span>
					</div>
				</div>

				<div>
					<label class="text-sm font-medium text-tg-hint block mb-3">Pay with</label>
					<div class="grid grid-cols-3 gap-3">
						<button onclick="selectCrypto('ltc')" id="crypto-ltc" class="crypto-btn border-2 border-tg-btn bg-tg-btn/10 p-3 rounded-2xl flex flex-col items-center gap-2 active:scale-95 transition-all text-tg-text">
							<span class="font-bold">LTC</span>
						</button>
						<button onclick="selectCrypto('doge')" id="crypto-doge" class="crypto-btn border-2 border-transparent bg-tg-secondary p-3 rounded-2xl flex flex-col items-center gap-2 active:scale-95 transition-all text-tg-text">
							<span class="font-bold">DOGE</span>
						</button>
						<button onclick="selectCrypto('btc')" id="crypto-btc" class="crypto-btn border-2 border-transparent bg-tg-secondary p-3 rounded-2xl flex flex-col items-center gap-2 active:scale-95 transition-all text-tg-text">
							<span class="font-bold">BTC</span>
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		lucide.createIcons();
		const tg = window.Telegram.WebApp;

		let currentUser = null;
		let selectedCrypto = 'ltc';
		let depositAmount = 10;
		let isModalOpen = false;
		
		const onMainButtonClick = () => generateInvoice();
		const onBackButtonClick = () => switchTab('dashboard');

		async function fetchAPI(endpoint, options = {}) {
			try {
				const response = await fetch(endpoint, {
					...options,
					headers: {
						...window.API_HEADERS,
						...(options.headers || {})
					}
				});
				
				const data = await response.json().catch(() => null);
				
				if (!response.ok) {
					throw new Error((data && data.error) ? data.error : `Server Error (${response.status})`);
				}
				return data;
			} catch (error) {
				console.error("API Error:", error);
				tg.showAlert(`Error: ${error.message}`);
				return null;
			}
		}

		async function initApp() {
			if (!tg.initData) {
				document.getElementById('env-error').classList.remove('hidden');
				return;
			}

			document.getElementById('app-container').classList.remove('hidden');
			tg.expand();
			tg.ready();
			tg.enableClosingConfirmation();

			syncTheme();
			tg.onEvent('themeChanged', syncTheme);

			window.API_HEADERS = {
				'Content-Type': 'application/json',
				'x-telegram-init-data': tg.initData
			};

			document.getElementById('global-loader').classList.remove('hidden');
			
			// Sequential loading to prevent race conditions on slow networks
			const meData = await fetchAPI('/api/user/me');
			if (meData && meData.success) {
				currentUser = meData.user;
				updateBalanceUI(currentUser.balance);
				document.getElementById('user-greeting').innerText = `Hello, ${tg.initDataUnsafe?.user?.first_name || 'User'}`;
				renderProxies(meData.proxies);
				
				const plansData = await fetchAPI('/api/store/plans');
				if (plansData && plansData.success) {
					renderPlans(plansData.plans);
				}
			}

			document.getElementById('global-loader').classList.add('hidden');
			switchTab('dashboard');
		}

		function syncTheme() {
			if (tg.colorScheme === 'dark') {
				document.documentElement.classList.add('dark');
			} else {
				document.documentElement.classList.remove('dark');
			}
			tg.setHeaderColor('bg_color'); 
			tg.setBackgroundColor('bg_color');
		}

		function updateBalanceUI(balance) {
			document.getElementById('wallet-balance').innerText = `$${parseFloat(balance).toFixed(2)}`;
		}

		function renderProxies(proxies) {
			const list = document.getElementById('proxies-list');
			const emptyState = document.getElementById('proxies-empty');
			
			if (!proxies || proxies.length === 0) {
				list.innerHTML = '';
				emptyState.classList.remove('hidden');
				emptyState.classList.add('flex');
				return;
			}
			
			emptyState.classList.add('hidden');
			emptyState.classList.remove('flex');

			list.innerHTML = proxies.map(p => {
				const percent = (p.bandwidth_remaining_gb / p.bandwidth_gb) * 100;
				const progress = Math.min(100, Math.max(0, percent));
				
				return `
				<div class="app-card p-5 rounded-3xl">
					<div class="flex justify-between items-start mb-4">
						<div>
							<h3 class="font-bold text-[16px] text-tg-text">${p.plan_name}</h3>
							<p class="text-xs text-green-500 font-medium mt-1">${p.status.toUpperCase()}</p>
						</div>
					</div>
					
					<div class="mb-5">
						<div class="flex justify-between text-xs mb-2 font-medium text-tg-hint">
							<span>Data</span>
							<span>${p.bandwidth_remaining_gb.toFixed(2)} / ${p.bandwidth_gb} GB</span>
						</div>
						<div class="w-full bg-tg-bg h-2.5 rounded-full overflow-hidden">
							<div class="bg-tg-btn h-full rounded-full transition-all" style="width: ${progress}%"></div>
						</div>
					</div>
					
					<div class="bg-tg-bg p-1 pl-4 rounded-xl flex justify-between items-center border border-tg-hint/10">
						<code class="text-xs font-mono text-tg-hint truncate mr-2 w-full">${p.proxy_url}</code>
						<button onclick="copyText('${p.proxy_url}')" class="p-2.5 bg-tg-secondary text-tg-text rounded-lg active:scale-95">
							<i data-lucide="copy" class="w-4 h-4"></i>
						</button>
					</div>
				</div>
			`}).join('');
			lucide.createIcons();
		}

		function renderPlans(plans) {
			const list = document.getElementById('plans-list');
			list.innerHTML = plans.map(p => `
				<div class="app-card p-4 rounded-3xl flex items-center justify-between">
					<div>
						<h3 class="font-bold text-[16px] text-tg-text">${p.name}</h3>
						<p class="text-xs text-tg-hint mt-1">${p.bandwidth_gb} GB Traffic</p>
					</div>
					<button onclick="buyPlan(${p.id}, ${p.price})" class="py-2.5 px-6 bg-tg-btn text-tg-btnText rounded-xl font-bold active:scale-95 transition-transform">
						$${p.price.toFixed(2)}
					</button>
				</div>
			`).join('');
		}

		async function buyPlan(planId, price) {
			if (!currentUser) return;
			tg.HapticFeedback.impactOccurred('medium');
			
			if (currentUser.balance < price) {
				tg.showConfirm(`Insufficient balance. You need $${price.toFixed(2)}.\nAdd funds now?`, (confirm) => {
					if(confirm) {
						updateDepositAmount(Math.ceil(price - currentUser.balance));
						document.getElementById('deposit-slider').value = Math.ceil(price - currentUser.balance);
						openDepositModal();
					}
				});
				return;
			}

			tg.showConfirm(`Confirm purchase for $${price.toFixed(2)}?`, async (confirm) => {
				if (!confirm) return;
				
				tg.MainButton.showProgress();
				const data = await fetchAPI('/api/store/buy', { method: 'POST', body: JSON.stringify({ planId }) });
				tg.MainButton.hideProgress();

				if (data && data.success) {
					tg.HapticFeedback.notificationOccurred('success');
					tg.showAlert("Proxy activated!");
					initApp(); 
				}
			});
		}

		function openDepositModal() {
			if (isModalOpen) return;
			isModalOpen = true;
			tg.HapticFeedback.impactOccurred('light');
			
			const modal = document.getElementById('deposit-modal');
			const content = document.getElementById('deposit-modal-content');
			
			modal.classList.remove('hidden');
			modal.classList.add('flex');
			
			setTimeout(() => {
				modal.classList.remove('opacity-0');
				content.classList.remove('translate-y-full');
			}, 10);

			tg.MainButton.setText(`PAY $${depositAmount}`);
			tg.MainButton.show();
			tg.MainButton.onClick(onMainButtonClick);
		}

		function closeDepositModal() {
			if (!isModalOpen) return;
			isModalOpen = false;
			
			const modal = document.getElementById('deposit-modal');
			const content = document.getElementById('deposit-modal-content');
			
			content.classList.add('translate-y-full');
			modal.classList.add('opacity-0');
			
			setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 200);
			tg.MainButton.hide();
			tg.MainButton.offClick(onMainButtonClick);
		}

		function updateDepositAmount(val) {
			depositAmount = parseInt(val);
			document.getElementById('deposit-amount-display').innerText = depositAmount;
			if (tg.MainButton.isVisible) tg.MainButton.setText(`PAY $${depositAmount}`);
		}

		function selectCrypto(currency) {
			tg.HapticFeedback.selectionChanged();
			selectedCrypto = currency;
			
			document.querySelectorAll('.crypto-btn').forEach(btn => {
				btn.classList.remove('border-tg-btn', 'bg-tg-btn/10');
				btn.classList.add('border-transparent', 'bg-tg-secondary');
			});
			
			const selectedBtn = document.getElementById(`crypto-${currency}`);
			selectedBtn.classList.add('border-tg-btn', 'bg-tg-btn/10');
			selectedBtn.classList.remove('border-transparent', 'bg-tg-secondary');
		}

		async function generateInvoice() {
			if(depositAmount < 1) return tg.showAlert("Min deposit is $1");

			tg.MainButton.showProgress();
			const data = await fetchAPI('/api/payments/invoice', {
				method: 'POST',
				body: JSON.stringify({ amountUsd: depositAmount, currency: selectedCrypto })
			});
			tg.MainButton.hideProgress();
			
			if (data && data.success && data.invoiceUrl) {
				tg.HapticFeedback.notificationOccurred('success');
				closeDepositModal();
				tg.openLink(data.invoiceUrl);
				tg.showPopup({ title: 'Invoice Created', message: 'Pay on the opened page. Balance updates automatically upon confirmation.', buttons: [{ type: 'ok' }] });
			}
		}

		function copyText(text) {
			navigator.clipboard.writeText(text).then(() => {
				tg.HapticFeedback.impactOccurred('light');
			}).catch(() => {
				// Fallback
				let textArea = document.createElement("textarea");
				textArea.value = text;
				document.body.appendChild(textArea);
				textArea.select();
				document.execCommand('copy');
				textArea.remove();
				tg.HapticFeedback.impactOccurred('light');
			});
		}

		function switchTab(tab) {
			tg.HapticFeedback.selectionChanged();
			document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
			document.getElementById(`view-${tab}`).classList.add('active');
			
			const dashBtn = document.getElementById('tab-dashboard');
			const storeBtn = document.getElementById('tab-store');
			
			if (tab === 'dashboard') {
				dashBtn.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-tg-bg text-tg-btn shadow-sm";
				storeBtn.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-tg-hint";
				tg.BackButton.hide();
				tg.BackButton.offClick(onBackButtonClick);
			} else {
				storeBtn.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-tg-bg text-tg-btn shadow-sm";
				dashBtn.className = "flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-tg-hint";
				tg.BackButton.show();
				tg.BackButton.onClick(onBackButtonClick);
			}
		}

		document.addEventListener("DOMContentLoaded", initApp);
	</script>
</body>
</html>
